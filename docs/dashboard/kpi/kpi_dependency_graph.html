<!doctype html>
<html lang="ja">

  <title>売上KPI構造マップ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="graph-page">
  <div class="app-shell">
    <header class="topbar">
      <button id="menuToggle" class="hamburger-button" type="button" aria-controls="graphSidebar" aria-expanded="false" aria-label="設定メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="brand">
        <span class="brand__label">売上改善の全体像</span>
        <div class="brand__row">
          <h1 class="brand__title">売上KPI構造マップ</h1>
          <div class="brand__guide" aria-label="このページの見方">
            <strong>問いから探す構造図</strong>
            <span>売上が落ちた時に、KGIから課金転換・単価・石消費・品質へ上から辿る。気になるノードをクリックして、前後の依存関係を確認する。</span>
          </div>
        </div>
      </div>
      <nav class="page-links" aria-label="ページ切り替え">
        <a class="page-link is-active" href="kpi_dependency_graph.html">売上KPI構造マップ</a>
        <a class="page-link" href="KPI_tree.txt">原本テキスト</a>
      </nav>
    </header>

    <div id="menuBackdrop" class="menu-backdrop"></div>

    <div class="graph-layout">
      <aside id="graphSidebar" class="sidebar graph-sidebar" aria-label="グラフ設定">
        <div class="drawer-head">
          <strong>グラフ設定</strong>
          <button id="menuClose" class="button" type="button">閉じる</button>
        </div>
        <section class="panel">
          <div class="panel__body">
            <h2 class="panel__title">検索</h2>
            <input id="graphSearch" class="search-box" type="search" placeholder="例: ARPPU, rDAU, 石">
          </div>
        </section>

        <section class="panel">
          <div class="panel__body">
            <h2 class="panel__title">表示条件</h2>
            <label class="toggle">
              <input id="importantOnly" type="checkbox">
              重要指標を中心に表示
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel__body">
            <h2 class="panel__title">補助情報</h2>
            <div class="note">ノードにカーソルを合わせると、おすすめ分析軸だけをツールチップで確認できます。</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel__body">
            <h2 class="panel__title">Mermaid風定義</h2>
            <pre id="mermaidCode" class="code-panel"></pre>
          </div>
        </section>
      </aside>

      <main class="main">
        <section class="panel">
          <div class="graph-stage-wrap">
            <div class="axis-rail graph-axis-rail" aria-label="分析軸">
              <span class="axis-rail__label">分析軸</span>
              <button class="axis-chip" type="button" data-axis="time">時間</button>
              <button class="axis-chip" type="button" data-axis="platform">プラットフォーム</button>
              <button class="axis-chip" type="button" data-axis="user">ユーザー分類</button>
              <button class="axis-chip" type="button" data-axis="item">販売物</button>
              <button class="axis-chip" type="button" data-axis="compare">時間比較</button>
            </div>
            <div id="graphStage" class="graph-stage" aria-label="売上KPI構造マップ"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

    graphData.nodes.forEach((node) => {
      node.note = nodeDescriptions[node.id] || node.note;
    });

    const state = {
      view: "all",
      query: "",
      importantOnly: false,
      selectedId: null
    };

    const nodeById = new Map(graphData.nodes.map((node) => [node.id, node]));
    const incoming = new Map();
    const outgoing = new Map();
    graphData.edges.forEach(([from, to, label]) => {
      if (!outgoing.has(from)) outgoing.set(from, []);
      if (!incoming.has(to)) incoming.set(to, []);
      outgoing.get(from).push({ from, to, label });
      incoming.get(to).push({ from, to, label });
    });
    const axisDescriptions = {
      time: {
        label: "時間",
        description: "年 / 月 / 週 / 日 / 曜日 / 時間帯 / 月初・月中・月末 / イベント前・中・後 / 周年期 / コラボ期"
      },
      platform: {

        description: "PCブラウザ / PCアプリ / スマホブラウザ / iOS / Google Play / プラットフォームD"
      },
      user: {
        label: "ユーザー分類",
        description: "課金状態 / プレイ継続期間 / プレイ頻度 / プレイ深度 / 攻略進捗 / キャラ資産 / ガチャ行動 / 施策反応 / 独自ユーザー分類 / リスク分類"
      },
      item: {
        label: "販売物",
        description: "ガチャ / 商品 / 月額パス / 石パック / 育成素材 / 衣装 / 復刻 / 限定"
      },
      compare: {
        label: "時間比較",
        description: "前日比 / 前週比 / 前月比 / 前年比 / 同日平均 / 直近12か月同日平均 / 目標比 / 予測比"
      }
    };
    function normalize(value) {
      return String(value || "").toLowerCase();
    }

    function nodeText(node) {
      return normalize(`${node.label} ${node.note || ""} ${node.category}`);
    }

    function nodeMark(node) {
      if (node.important) return "★";
      if (node.mark === "circle") return "〇";
      return "";
    }

    function isMarkedNode(node) {
      return Boolean(node.important || node.mark === "circle");
    }

    function includeAncestors(id, set) {
      (incoming.get(id) || []).forEach((edge) => {
        if (!set.has(edge.from)) {
          set.add(edge.from);
          includeAncestors(edge.from, set);
        }
      });
    }

    function includeChildren(id, set) {
      (outgoing.get(id) || []).forEach((edge) => {
        set.add(edge.to);
      });
    }

    function includeDescendants(id, set) {
      (outgoing.get(id) || []).forEach((edge) => {
        if (!set.has(edge.to)) {
          set.add(edge.to);
          includeDescendants(edge.to, set);
        }
      });
    }

    function getVisibleNodeIds() {
      const base = new Set(
        graphData.nodes
          .filter((node) => node.views.includes(state.view))
          .map((node) => node.id)
      );

      let visible = new Set(base);

      if (state.importantOnly) {
        visible = new Set(
          [...visible].filter((id) => {
            const node = nodeById.get(id);
            return isMarkedNode(node) || node.layer <= 1;
          })
        );
        [...visible].forEach((id) => includeAncestors(id, visible));
      }

      if (state.query) {
        const matches = [...base].filter((id) => nodeText(nodeById.get(id)).includes(state.query));
        visible = new Set();
        matches.forEach((id) => {
          visible.add(id);
          includeAncestors(id, visible);
          includeChildren(id, visible);
        });
      }

      return visible;
    }

    function getVisibleEdges(visibleIds) {
      return graphData.edges
        .map(([from, to, label]) => ({ from, to, label }))
        .filter((edge) => visibleIds.has(edge.from) && visibleIds.has(edge.to));
    }

    function relatedIds(selectedId) {
      const related = new Set();
      if (!selectedId) return related;
      related.add(selectedId);
      includeAncestors(selectedId, related);
      includeDescendants(selectedId, related);
      return related;
    }

    function activeRelatedIds() {
      if (state.selectedId) return relatedIds(state.selectedId);
      return new Set();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function wrapText(label, maxChars) {
      const chunks = [];
      let rest = label;
      while (rest.length > maxChars) {
        chunks.push(rest.slice(0, maxChars));
        rest = rest.slice(maxChars);
      }
      chunks.push(rest);
      return chunks;
    }

    function wrapNoteText(note, maxChars) {
      return (String(note || "").match(/[^。]+。?/g) || [])
        .flatMap((sentence) => wrapText(sentence.trim(), maxChars))
        .filter(Boolean);
    }

    function nodeLines(node) {
      const labelLines = wrapText(node.label, 13).slice(0, 2);
      const noteLines = wrapNoteText(node.note || "", 18);
      return { labelLines, noteLines };
    }

    function nodeHeight(node) {
      const lines = nodeLines(node);
      return Math.max(92, 18 + lines.labelLines.length * 17 + 7 + lines.noteLines.length * 14 + 12);
    }

    function resolveLayoutLayers(nodes, visibleEdges) {
      const layers = new Map(nodes.map((node) => [node.id, node.layer]));
      for (let pass = 0; pass < nodes.length; pass += 1) {
        let changed = false;
        visibleEdges.forEach((edge) => {
          if (!layers.has(edge.from) || !layers.has(edge.to)) return;
          const parentLayer = layers.get(edge.from);
          const childLayer = layers.get(edge.to);
          if (childLayer <= parentLayer) {
            layers.set(edge.to, parentLayer + 1);
            changed = true;
          }
        });
        if (!changed) break;
      }
      return layers;
    }

    function buildLayout(visibleIds, visibleEdges) {
      const nodes = [...visibleIds].map((id) => nodeById.get(id));
      const layoutLayers = resolveLayoutLayers(nodes, visibleEdges);
      const layers = new Map();
      nodes.forEach((node) => {
        const layer = layoutLayers.get(node.id) ?? node.layer;
        if (!layers.has(layer)) layers.set(layer, []);
        layers.get(layer).push(node);
      });

      const layerKeys = [...layers.keys()].sort((a, b) => a - b);
      const stageWidth = Math.max(document.getElementById("graphStage").clientWidth || 0, 960);
      const nodeWidth = 236;
      const layerGap = 92;
      const columnGap = 24;
      const rowGap = 32;
      const marginX = 42;
      const marginY = 38;
      const availableWidth = Math.max(stageWidth - marginX * 2, nodeWidth);
      const maxPerRow = Math.max(1, Math.floor((availableWidth + columnGap) / (nodeWidth + columnGap)));
      const positions = new Map();
      let cursorY = marginY;

      const sourceOrder = new Map(graphData.nodes.map((node, index) => [node.id, index]));

      layerKeys.forEach((layer) => {
        const parentCenter = (id) => {
          const parentPositions = (incoming.get(id) || [])
            .map((edge) => positions.get(edge.from))
            .filter(Boolean);
          if (!parentPositions.length) return Number.POSITIVE_INFINITY;
          return parentPositions.reduce((sum, pos) => sum + pos.x + pos.width / 2, 0) / parentPositions.length;
        };
        const layerNodes = layers.get(layer).sort((a, b) => {
          const aCenter = parentCenter(a.id);
          const bCenter = parentCenter(b.id);
          if (aCenter !== bCenter) {
            if (!Number.isFinite(aCenter)) return 1;
            if (!Number.isFinite(bCenter)) return -1;
            return aCenter - bCenter;
          }
          return sourceOrder.get(a.id) - sourceOrder.get(b.id);
        });
        const rows = [];
        for (let index = 0; index < layerNodes.length; index += maxPerRow) {
          rows.push(layerNodes.slice(index, index + maxPerRow));
        }

        rows.forEach((row, rowIndex) => {
          const rowWidth = row.length * nodeWidth + Math.max(row.length - 1, 0) * columnGap;
          const offsetX = marginX + Math.max((availableWidth - rowWidth) / 2, 0);
          const rowHeight = Math.max(...row.map((node) => nodeHeight(node)));
          row.forEach((node, columnIndex) => {
            const height = nodeHeight(node);
            positions.set(node.id, {
              x: offsetX + columnIndex * (nodeWidth + columnGap),
              y: cursorY,
              width: nodeWidth,
              height
            });
          });
          cursorY += rowHeight + rowGap;
        });

        cursorY += layerGap - rowGap;
      });

      return {
        positions,
        width: stageWidth,
        height: Math.max(cursorY + marginY - layerGap, 520)
      };
    }

    function renderGraph() {
      const visibleIds = getVisibleNodeIds();
      const visibleEdges = getVisibleEdges(visibleIds);
      const stage = document.getElementById("graphStage");

      if (!visibleIds.size) {
        stage.innerHTML = '<div class="graph-empty">条件に合う依存関係がありません。</div>';
        return;
      }

      const layout = buildLayout(visibleIds, visibleEdges);
      const related = activeRelatedIds();
      const hasFocus = Boolean(state.selectedId);

      const edgeHtml = visibleEdges.map((edge) => {
        const from = layout.positions.get(edge.from);
        const to = layout.positions.get(edge.to);
        if (!from || !to) return "";
        const x1 = from.x + from.width / 2;
        const y1 = from.y + from.height;
        const x2 = to.x + to.width / 2;
        const y2 = to.y;
        const verticalGap = Math.max(42, Math.abs(y2 - y1) * 0.45);
        const c1 = y1 + verticalGap;
        const c2 = y2 - verticalGap;
        const labelX = (x1 + x2) / 2;
        const labelY = (y1 + y2) / 2 - 8;
        const isRelated = hasFocus && related.has(edge.from) && related.has(edge.to);
        const relatedClass = isRelated ? " is-related" : "";
        const dimClass = hasFocus && !isRelated ? " is-dim" : "";
        return `
          <path class="graph-edge${relatedClass}${dimClass}" d="M ${x1} ${y1} C ${x1} ${c1}, ${x2} ${c2}, ${x2} ${y2}" marker-end="url(#arrow)"></path>
          ${edge.label ? `<text class="graph-edge-label${relatedClass}${dimClass}" x="${labelX}" y="${labelY}" text-anchor="middle">${escapeHtml(edge.label)}</text>` : ""}
        `;
      }).join("");

      const nodeHtml = [...visibleIds].map((id) => {
        const node = nodeById.get(id);
        const pos = layout.positions.get(id);
        const lines = nodeLines(node);
        const match = state.query && nodeText(node).includes(state.query) ? " is-match" : "";
        const selected = state.selectedId === id ? " is-selected" : "";
        const relatedClass = hasFocus && related.has(id) ? " is-related" : "";
        const dimClass = hasFocus && !related.has(id) ? " is-dim" : "";
        const labelY = pos.y + 23;
        const noteY = labelY + lines.labelLines.length * 17 + 7;
        const labelLines = lines.labelLines.map((line, index) => {
          return `<text x="${pos.x + 12}" y="${labelY + index * 17}">${escapeHtml(line)}</text>`;
        }).join("");
        const noteLines = lines.noteLines.map((line, index) => {
          return `<text class="node-note" x="${pos.x + 12}" y="${noteY + index * 14}">${escapeHtml(line)}</text>`;
        }).join("");
        const mark = nodeMark(node);
        const markX = pos.x + pos.width - 22;
        const markHtml = mark ? `<text class="node-mark" data-mark="${mark}" x="${markX}" y="${pos.y + 21}" text-anchor="middle">${mark}</text>` : "";
        return `
          <g class="graph-node${match}${selected}${relatedClass}${dimClass}" data-id="${node.id}" data-category="${node.category}" role="button" tabindex="0">
            <rect x="${pos.x}" y="${pos.y}" width="${pos.width}" height="${pos.height}" rx="8"></rect>
            ${labelLines}
            ${noteLines}
            ${markHtml}
          </g>
        `;
      }).join("");

      stage.innerHTML = `
        <svg class="graph-svg" viewBox="0 0 ${layout.width} ${layout.height}" width="100%" height="${layout.height}" aria-label="KPI dependency graph">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7b3"></path>
            </marker>
          </defs>
          ${edgeHtml}
          ${nodeHtml}
        </svg>
      `;

      stage.querySelectorAll(".graph-node").forEach((nodeEl) => {
        nodeEl.addEventListener("click", () => {
          state.selectedId = nodeEl.dataset.id;
          render();
        });
        nodeEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            state.selectedId = nodeEl.dataset.id;
            render();
          }
        });
      });
    }

    function renderMermaidCode() {
      const visibleIds = getVisibleNodeIds();
      const visibleEdges = getVisibleEdges(visibleIds);
      const nodes = [...visibleIds].map((id) => nodeById.get(id));
      const lines = ["flowchart TD"];
      nodes.forEach((node) => {
        const note = (node.note || "").replaceAll('"', "'");
        lines.push(`  ${node.id}["${nodeMark(node)}${node.label}<br/>${note}"]`);
      });
      visibleEdges.forEach((edge) => {
        const label = edge.label ? `|${edge.label}|` : "";
        lines.push(`  ${edge.from} -->${label} ${edge.to}`);
      });
      document.getElementById("mermaidCode").textContent = lines.join("\n");
    }

    function ensureAxisPopover() {
      let popover = document.getElementById("axisPopover");
      if (!popover) {
        popover = document.createElement("div");
        popover.id = "axisPopover";
        popover.className = "axis-popover";
        popover.hidden = true;
        document.body.appendChild(popover);
      }
      return popover;
    }

    function hideAxisPopover() {
      const popover = ensureAxisPopover();
      popover.hidden = true;
      popover.innerHTML = "";
      document.querySelectorAll("[data-axis]").forEach((button) => button.classList.remove("is-active"));
    }

    function showAxisPopover(axisId, anchor) {
      const axis = axisDescriptions[axisId];
      const popover = ensureAxisPopover();
      if (!axis) return;
      const activeButton = document.querySelector(`[data-axis="${axisId}"]`);
      const alreadyOpen = !popover.hidden && activeButton && activeButton.classList.contains("is-active");
      if (alreadyOpen) {
        hideAxisPopover();
        return;
      }
      document.querySelectorAll("[data-axis]").forEach((button) => button.classList.toggle("is-active", button.dataset.axis === axisId));
      popover.hidden = false;
      popover.innerHTML = `
        <strong>${escapeHtml(axis.label)}</strong>
        <span>${escapeHtml(axis.description)}</span>
      `;
      const anchorRect = anchor.getBoundingClientRect();
      const popoverRect = popover.getBoundingClientRect();
      const viewportPadding = 12;
      const left = Math.min(
        Math.max(anchorRect.left, viewportPadding),
        window.innerWidth - popoverRect.width - viewportPadding
      );
      const top = anchorRect.bottom + 8;
      popover.style.left = `${left}px`;
      popover.style.top = `${top}px`;
    }

    function render() {
      renderGraph();
      renderMermaidCode();
    }

    document.getElementById("graphSearch").addEventListener("input", (event) => {
      state.query = normalize(event.target.value.trim());
      state.selectedId = null;
      render();
    });

    document.getElementById("importantOnly").addEventListener("change", (event) => {
      state.importantOnly = event.target.checked;
      state.selectedId = null;
      render();
    });

    document.getElementById("graphStage").addEventListener("click", (event) => {
      if (event.target.closest(".graph-node")) return;
      if (!state.selectedId) return;
      state.selectedId = null;
      render();
    });

    document.querySelectorAll("[data-axis]").forEach((button) => {
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        showAxisPopover(button.dataset.axis, button);
      });
    });

    const menuToggle = document.getElementById("menuToggle");
    const menuClose = document.getElementById("menuClose");
    const menuBackdrop = document.getElementById("menuBackdrop");

    function setMenuOpen(open) {
      document.body.classList.toggle("menu-open", open);
      menuToggle.setAttribute("aria-expanded", String(open));
      menuToggle.setAttribute("aria-label", open ? "設定メニューを閉じる" : "設定メニューを開く");
    }

    menuToggle.addEventListener("click", () => {
      setMenuOpen(!document.body.classList.contains("menu-open"));
    });

    menuClose.addEventListener("click", () => setMenuOpen(false));
    menuBackdrop.addEventListener("click", () => setMenuOpen(false));

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setMenuOpen(false);
        hideAxisPopover();
      }
    });

    document.addEventListener("click", (event) => {
      const popover = ensureAxisPopover();
      if (popover.hidden) return;
      if (event.target.closest(".axis-rail") || event.target.closest("#axisPopover")) return;
      hideAxisPopover();
    });

    window.addEventListener("resize", () => {
      renderGraph();
    });

    render();
  </script>
</body>
</html>
