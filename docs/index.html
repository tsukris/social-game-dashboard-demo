<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ソシャゲ向けBI サンプルダッシュボード </title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #172033;
      background: #f6f8fb;
      font-family: "Yu Gothic", "Meiryo", sans-serif;
    }

    main {
      width: min(960px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 0;
      display: grid;
      align-content: center;
      gap: 24px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 32px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      color: #4b5870;
      font-size: 16px;
      line-height: 1.8;
    }

    .primary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card,
    .text-link {
      border: 1px solid #dce4ef;
      background: #fff;
      color: #172033;
      text-decoration: none;
      box-shadow: 0 14px 36px rgba(23, 32, 51, 0.08);
    }

    .card {
      min-height: 164px;
      padding: 22px;
      border-radius: 12px;
    }

    .card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.45;
    }

    .card span {
      color: #5f6d82;
      font-size: 14px;
      line-height: 1.75;
    }

    .secondary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .text-link {
      padding: 12px 14px;
      border-radius: 10px;
      color: #30415f;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    .note {
      color: #69778e;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .primary-grid,
      .secondary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>ソシャゲ向けBI サンプルダッシュボード</h1>
      <p class="lead">まずゲーム状況サマリーで運営判断の画面イメージを見せ、その後KPI Treeで売上分解の考え方を補強できます。</p>
    </div>

    <div class="primary-grid">
      <a class="card" href="dashboard/mock/control_tower_sample.html">
        <strong>ゲーム状況サマリー</strong>
        <span>売上、ユーザー、施策状況をまとめて見るためのメイン画面です。</span>
      </a>
      <a class="card" href="dashboard/kpi/kpi_dependency_graph.html">
        <strong>KPI Tree</strong>
        <span>売上KPIをどの指標に分解して運営改善へつなげるかを確認できます。</span>
      </a>
    </div>

    <div class="secondary" aria-label="追加画面">
      <a class="text-link" href="dashboard/mock/sales_analysis.html">課金分析</a>
      <a class="text-link" href="dashboard/mock/user_analysis.html">ユーザー分析</a>
      <a class="text-link" href="dashboard/mock/event_timeline.html">イベント分析</a>
      <a class="text-link" href="dashboard/mock/questionnaire_analysis_20260418.html">アンケート分析</a>
    </div>

    <p class="note">ZIPを展開したうえで、ChromeまたはEdgeでこの index.html を開いてください。サーバー起動やインターネット接続は不要です。</p>
  </main>
</body>
</html>
